<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Britto | Creative Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&display=swap" rel="stylesheet">

<style>

  background: #0e0e0e;
  color: #fff;

section {

}

/* HERO */
.hero {
  height: 100vh;

}

.hero h1 {

}

.hero p {

/* WORK */
.work-item {
  border-top: 1px solid #222;

.work-item:hover {

  color: #ff6a3d;

/* ABOUT */
.about p {
  max-width: 500px;

/* CONTACT */
.contact a {
  display: inline-block;
  margin-top: 20px;
  color: white;

  padding: 10px 20px;

  color: black;
}

<section class="hero">
