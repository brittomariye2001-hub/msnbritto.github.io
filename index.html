<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>msnbritto | Cinematic Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #030303;
  color: white;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: radial-gradient(circle at center, #111, #000);
  text-align: center;
}

header h1 {
  font-size: 4.5rem;
  font-family: 'Playfair Display', serif;
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(255,215,0,0.5);
}

header p {
  color: #aaa;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 12px 30px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
  transition: 0.4s;
}

.btn:hover {
  background: gold;
  color: black;
  box-shadow: 0 0 25px gold;
}

/* SECTION */
section {
  padding: 100px 12%;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* PORTFOLIO */
.work {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  display: block;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.6s;
}

/* HOVER */
.card:hover img {
  transform: scale(1.15);
  filter: brightness(50%);
}

.card::after {
  content: "VIEW";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: gold;
  font-size: 1.2rem;
  opacity: 0;
  transition: 0.4s;
}

.card:hover::after {
  opacity: 1;
}

/* ABOUT */
.about {
  text-align: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #555;
}

/* CURSOR GLOW */
.cursor {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 999;
}

</style>
</head>

<body>

<div class="cursor"></div>

<header>
  <h1>BRITTO</h1>
  <p>Cinematic Visual Designer</p>
  <a href="https://wa.me/918148829161" target="_blank" class="btn">Hire Me</a>
</header>

<section class="show">
  <h2>My Work</h2>
  <div class="work">

    <a href="#" class="card">
      <img src="image1.jpg" alt="Project">
    </a>

    <a href="#" class="card">
      <img src="image2.jpg" alt="Project">
    </a>

    <a href="#" class="card">
      <img src="image3.jpg" alt="Project">
    </a>

  </div>
</section>

<section>
  <h2>Featured Projects</h2>
  <div class="work">

    <a href="https://www.behance.net/brittomsn" target="_blank" class="card">
      <img src="project1.jpg" alt="Behance Project">
    </a>

    <a href="https://www.behance.net/brittomsn" target="_blank" class="card">
      <img src="project2.jpg" alt="Behance Project">
    </a>

  </div>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I create cinematic edits, spiritual visuals, and high-end design experiences.</p>

  <a href="https://www.behance.net/brittomsn" target="_blank" class="btn">
    View Full Portfolio
  </a>
</section>

<footer>
  <p>© 2026 Britto</p>
</footer>

<script>

/* SCROLL ANIMATION */
const sections = document.querySelectorAll("section");

const reveal = () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
};

window.addEventListener("scroll", reveal);
window.addEventListener("load", reveal);

/* CURSOR GLOW */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

</script>

</body>
</html>
