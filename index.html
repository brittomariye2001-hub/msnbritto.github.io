<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Britto | Creative Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  text-align: center;
}

header h1 {
  font-size: 4rem;
  font-family: 'Playfair Display', serif;
  letter-spacing: 3px;
}

header p {
  color: #aaa;
  margin-top: 10px;
}

/* GLOW BUTTON */
.btn {
  margin-top: 25px;
  padding: 12px 30px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
  transition: 0.4s;
}

.btn:hover {
  background: gold;
  color: black;
  box-shadow: 0 0 20px gold;
}

/* SECTION */
section {
  padding: 80px 10%;
}

/* PORTFOLIO */
.work {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
}

.card img {
  width: 100%;
  transition: 0.5s;
}

/* HOVER EFFECT */
.card:hover img {
  transform: scale(1.1);
  filter: brightness(60%);
}

.card::after {
  content: "View Project";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: gold;
  opacity: 0;
  transition: 0.4s;
}

.card:hover::after {
  opacity: 1;
}

/* ABOUT */
.about {
  text-align: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #666;
}

</style>
</head>

<body>

<header>
  <h1>BRITTO</h1>
  <p>Cinematic Visual Designer</p>
  <a href="https://wa.me/91XXXXXXXXXX" class="btn">Hire Me</a>
</header>

<section>
  <h2>My Work</h2>
  <div class="work">

    <div class="card">
      <img src="image1.jpg">
    </div>

    <div class="card">
      <img src="image2.jpg">
    </div>

    <div class="card">
      <img src="image3.jpg">
    </div>

  </div>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I craft cinematic visuals, spiritual designs, and high-end edits that tell powerful stories.</p>
</section>

<footer>
  <p>© 2026 Britto</p>
</footer>

</body>
</html>
